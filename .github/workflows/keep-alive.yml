name: Keep Render Alive

on:
  schedule:
    # Ping every 14 minutes to prevent Render free tier from sleeping (sleeps after 15 min)
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Nakama server
        run: |
          curl -sf "${{ secrets.RENDER_BACKEND_URL }}/healthcheck" || \
          curl -sf "${{ secrets.RENDER_BACKEND_URL }}/" || \
          echo "Service may be starting up"
