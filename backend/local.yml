name: grid-battle

logger:
  level: INFO

session:
  token_expiry_sec: 7200

socket:
  max_message_size_bytes: 4096
  max_request_size_bytes: 131072
  read_buffer_size_bytes: 4096
  write_buffer_size_bytes: 4096
  outgoing_queue_size: 64
  pong_wait_ms: 25000
  ping_period_ms: 15000
  ping_backoff_threshold: 5

runtime:
  js_entrypoint: "main.js"

console:
  username: "admin"
  password: "admin123"
  signing_key: "grid-battle-console-signing-key"
