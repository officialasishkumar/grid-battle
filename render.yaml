databases:
  - name: grid-battle-db
    plan: free
    databaseName: nakama
    user: nakama

services:
  - type: web
    name: grid-battle-nakama
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grid-battle-db
          property: connectionString
      - key: NAKAMA_SERVER_KEY
        value: defaultkey
      - key: CONSOLE_USERNAME
        value: admin
      - key: CONSOLE_PASSWORD
        generateValue: true
