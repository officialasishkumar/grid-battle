version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: grid-battle-db
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.24.2
    container_name: grid-battle-nakama
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /nakama/nakama
      - --config
      - /nakama/data/local.yml
      - --database.address
      - postgres:localdb@postgres:5432/nakama
    volumes:
      - ./backend/build:/nakama/data/modules
      - ./backend/local.yml:/nakama/data/local.yml
    ports:
      - "7349:7349"   # gRPC API
      - "7350:7350"   # HTTP API
      - "7351:7351"   # Console
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
